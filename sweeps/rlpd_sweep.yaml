program: test_scripts/test_iql.py
name: rlpd_iql_sweep_15_demos
method: bayes
metric:
  goal: maximize
  name: eval/mean_reward
parameters:
  algorithm:
    values: ["rlpd"] 
  metaworld:
    values: ["single_task"] 
  reward:
    values: ["dense"]
  general_training.n_critics:
    values: [5, 10]
  general_training.n_critics_to_sample:
    values: [2, 4]
  general_training.rlpd_train_critic_with_entropy:
    values: [True, False]
  general_training.learning_rate:
    values: [1e-4, 1e-3]
  general_training.critic_update_ratio:
    values: [1, 2, 4]
  general_training.action_noise:
    values: [0, 0.1]

command:
  - ${env}
  - ${interpreter}
  - ${program}
  - ${args_no_hyphens}