# @package _global_

defaults:
  - _self_

logging:
  eval_freq: 5000
  video_freq: 10000

general_training:
  algo: sac
  name: sac
  action_noise: null # sigma
  learning_rate: 3e-4


model:
  policy_layer_norm: true
  critic_layer_norm: true
  pi_net_arch: [512, 400, 400]
  qf_net_arch: [512, 400, 400]
  
offline_training:
  offline_training_steps: 0 # SAC is online-only
  

online_training:
  total_time_steps: 500000
  mix_buffers_ratio: 0.0