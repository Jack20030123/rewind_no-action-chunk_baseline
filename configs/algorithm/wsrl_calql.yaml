# @package _global_

defaults:
  - _self_

# Because RLPD is slower, we will log more frequently
logging:
  eval_freq: 5000
  video_freq: 10000

general_training:
  algo: rlpd
  name: wsrl_calql
  action_noise: 0.1 # sigma
  learning_rate: 1e-3

  # offline rl parameters
  n_critics: 5
  n_critics_to_sample: 2

  # RLPD-specific parameters
  rlpd_train_critic_with_entropy: true
  # Note: RLPD's offline step uses default params defined in base_config.yaml
  rlpd_offline_algo: cql
  cql_min_q_weight: .01
  cql_min_q_temp: 1.0
  use_calibrated_q: true # calibrated QL https://arxiv.org/pdf/2303.05479


model:
  policy_layer_norm: true
  critic_layer_norm: true
  pi_net_arch: [768, 512, 256]
  qf_net_arch: [768, 512, 512]

offline_training:
  offline_training_steps: 200000
  ckpt_path: null  # Path to load checkpoint from, if provided will skip offline training
  critic_update_ratio: 1

online_training:
  total_time_steps: 100000
  mix_buffers_ratio: 0.0
  warm_start_online_rl: true
  learning_starts: 4000
  critic_update_ratio: 4
