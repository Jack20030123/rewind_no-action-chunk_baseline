# @package _global_

reward_model: 
  name: 'rewind'
  batch_size: 64
  model_path: '${oc.env:REWIND_CKPT,checkpoints/rewind_metaworld_epoch_19.pth}'
  use_pca: false
  success_bonus: 200
  reward_divisor: 1
  reward_at_every_step: true
  sum_reward: false
  
general_training:
  dense_rewards_at_end: false
  learning_rate: 1e-3
  entropy_term: "auto"
  normalize_reward: false
  terminate_on_success: true
